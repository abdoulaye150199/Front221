<header class="header">
  <div class="header-left">
    <div class="logo">
      <img src="/assets/image/image.png" alt="Ecole 221" class="logo-image" />
      <span class="logo-text">Ecole 221</span>
    </div>
    <div class="search-bar">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Rechercher..." />
    </div>
  </div>

  <div class="header-right">
    <button mat-icon-button class="notification-btn">
      <mat-icon>notifications</mat-icon>
      <span class="notification-badge"></span>
    </button>

    <button type="button" [matMenuTriggerFor]="profileMenu" class="profile-btn">
      <div class="avatar">{{ userInitial }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
      <mat-icon>expand_more</mat-icon>
    </button>

    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>account_circle</mat-icon>
        <span>Mon Profil</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Paramètres</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item>
        <mat-icon>logout</mat-icon>
        <span>Déconnexion</span>
      </button>
    </mat-menu>
  </div>
</header>
