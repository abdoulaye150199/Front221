<div class="filters-card">
  <div class="filters-left">
    <div class="filter-group">
      <label>{{ pageSizeLabel }}</label>
      <select [ngModel]="pageSizeValue" (ngModelChange)="pageSizeChange.emit($event)">
        <option *ngFor="let item of pageSizeOptions" [value]="item.value">
          {{ item.label }}
        </option>
      </select>
    </div>

    <div class="filter-group" *ngFor="let filter of filters">
      <label>{{ filter.label }}</label>
      <select [ngModel]="filter.value" (ngModelChange)="onFilterValueChange(filter.id, $event)">
        <option *ngFor="let item of filter.options" [value]="item.value">
          {{ item.label }}
        </option>
      </select>
    </div>
  </div>

  <label class="search-box">
    <mat-icon>search</mat-icon>
    <input
      type="text"
      [placeholder]="searchPlaceholder"
      [ngModel]="searchTerm"
      (ngModelChange)="searchTermChange.emit($event)"
    />
  </label>
</div>
