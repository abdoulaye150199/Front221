<div class="login-wrapper">
  <!-- Left Panel: Branding & Features -->
  <div class="login-left-panel">
    <div class="branding-section">
      <div class="logo-wrapper">
        <img src="/assets/image/image.png" alt="Ecole 221 Logo" class="logo-image" />
      </div>
      <h1 class="brand-title">Ecole 221</h1>
      <p class="brand-subtitle">Plateforme de gestion scolaire</p>
    </div>

    <!-- Features Section -->
    <div class="features-section">
      <div class="feature-item" [innerHTML]="icons.features.secure"></div>
      <div class="feature-item" [innerHTML]="icons.features.tracking"></div>
      <div class="feature-item" [innerHTML]="icons.features.dashboard"></div>
    </div>
  </div>

  <!-- Right Panel: Login Form -->
  <div class="login-right-panel">
    <div class="login-header">
      <img src="/assets/image/image.png" alt="Ecole 221 Logo" class="header-logo-image" />
    </div>

    <div class="login-content">
      <p class="welcome-text">Bienvenue sur <span class="brand-highlight">ECOLE 221</span></p>
      <h2 class="login-title">Se connecter</h2>

      <!-- Google Sign In Button -->
      <button class="google-signin-btn">
        <span [innerHTML]="icons.google"></span>
        <span>Sign in with Google</span>
      </button>

      <!-- Divider -->
      <div class="divider">
        <span>ou</span>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <!-- Phone/Email Field -->
        <div class="form-group">
          <label for="phone-email">Entrez votre numéro de téléphone ou votre email</label>
          <div class="input-wrapper">
            <span class="input-icon" [innerHTML]="icons.email"></span>
            <input
              id="phone-email"
              type="text"
              formControlName="phoneOrEmail"
              placeholder="Téléphone ou email"
              class="form-input"
            />
          </div>
          <span class="error-message" *ngIf="phoneOrEmailErrorMessage">
            {{ phoneOrEmailErrorMessage }}
          </span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Entrez votre mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon" [innerHTML]="icons.password"></span>
            <input
              id="password"
              [type]="passwordFieldType"
              formControlName="password"
              placeholder="Mot de passe"
              class="form-input"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              tabindex="-1"
              [attr.aria-pressed]="showPassword"
              [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            >
              <span [innerHTML]="icons.passwordEye"></span>
            </button>
          </div>
          <a href="#" class="forgot-password-link">Mot de passe oublié ?</a>
          <span class="error-message" *ngIf="passwordErrorMessage">
            {{ passwordErrorMessage }}
          </span>
        </div>

        <!-- Login Error Message -->
        <div class="error-alert" *ngIf="loginError">
          <span [innerHTML]="icons.error"></span>
          <span>{{ loginError }}</span>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="login-button"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading" class="loading-text">Connexion en cours...</span>
        </button>
      </form>

      <!-- Footer -->
      <p class="login-footer">© 2025 Ecole 221 — Tous droits réservés</p>
    </div>
  </div>
</div>
