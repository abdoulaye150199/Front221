<div class="ressources">
  <div class="page-header">
    <h1 class="page-title">Gestion des Ressources</h1>
    <button mat-flat-button class="primary-btn" type="button">
      <mat-icon>add</mat-icon>
      Nouvelle Ressource
    </button>
  </div>

  <div class="resource-card">
    <div class="main-tabs">
      <button
        class="main-tab"
        type="button"
        *ngFor="let tab of mainTabs; let i = index"
        [class.active]="activeMainTab === i"
        (click)="setActiveMainTab(i)"
      >
        <span class="tab-icon">
          <mat-icon>{{ tab.icon }}</mat-icon>
        </span>
        <span class="tab-text">
          <span class="tab-title">{{ tab.title }}</span>
          <span class="tab-subtitle" *ngIf="tab.subtitle">{{ tab.subtitle }}</span>
        </span>
        <mat-icon class="tab-more">more_vert</mat-icon>
      </button>
    </div>

    <div class="tab-content" *ngIf="activeMainTab === 0">
      <div class="sub-tabs">
        <button
          class="sub-tab"
          type="button"
          *ngFor="let tab of ['Année Scolaire', 'Suivi des événements', 'Calendrier Général']; let i = index"
          [class.active]="activeSubTab === i"
          (click)="setActiveSubTab(i)"
        >
          {{ tab }}
        </button>
      </div>

      <div class="subtab-content" *ngIf="activeSubTab === 0">
        <app-academic-years></app-academic-years>
      </div>

      <div class="subtab-content" *ngIf="activeSubTab === 1">
        <app-tracked-events></app-tracked-events>
      </div>

      <div class="subtab-content" *ngIf="activeSubTab === 2">
        <app-general-calendar></app-general-calendar>
      </div>
    </div>

    <div class="tab-content" *ngIf="activeMainTab === 1">
      <div class="sub-tabs">
        <button
          class="sub-tab"
          type="button"
          *ngFor="let tab of ['Domaines', 'Mention', 'Spécialité', 'Cycle', 'Niveau', 'Semestres']; let i = index"
          [class.active]="activeSubTab === i"
          (click)="setActiveSubTab(i)"
        >
          {{ tab }}
        </button>
      </div>

      <div class="subtab-content">
        <app-speciality-catalog></app-speciality-catalog>
      </div>
    </div>

    <div class="tab-content placeholder" *ngIf="activeMainTab > 1">
      <div class="placeholder-card">
        <div class="placeholder-icon">
          <mat-icon>insert_drive_file</mat-icon>
        </div>
        <div class="placeholder-title">Section en préparation</div>
        <p class="placeholder-text">
          Les informations pour "{{ mainTabs[activeMainTab].title }}" seront disponibles
          prochainement.
        </p>
      </div>
    </div>
  </div>
</div>
